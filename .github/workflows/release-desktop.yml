name: Release Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  UV_PYTHON: "3.12"
  PYTHONUTF8: "1"
  FLET_CLI_NO_RICH_OUTPUT: "1"

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos
            runner: macos-15
            build_cmd: flet build macos
            artifact_name: watchcat-macos
          - name: windows
            runner: windows-2022
            build_cmd: flet build windows
            artifact_name: watchcat-windows

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Install macOS prerequisites
        if: matrix.name == 'macos'
        run: |
          sudo softwareupdate --install-rosetta --agree-to-license || true
          if ! command -v pod >/dev/null 2>&1; then
            sudo gem install cocoapods
          fi
          pod --version

      - name: Build app
        run: |
          uv run ${{ matrix.build_cmd }} --yes --verbose

      - name: Show build outputs
        run: |
          find build -maxdepth 6 -print

      - name: Locate macOS app bundle
        if: matrix.name == 'macos'
        id: locate_macos_app
        run: |
          app_path="$(find build/macos -name '*.app' -print -quit)"
          if [ -z "$app_path" ]; then
            echo "No .app bundle found in build/macos"
            exit 1
          fi
          echo "app_path=$app_path" >> "$GITHUB_OUTPUT"

      - name: Validate macOS signing secrets
        if: matrix.name == 'macos'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          missing=0
          for var in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID KEYCHAIN_PASSWORD; do
            if [ -z "${!var}" ]; then
              echo "Missing required GitHub secret: $var"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Remove unsafe symlinks from macOS app bundle
        if: matrix.name == 'macos'
        run: |
          app_path="${{ steps.locate_macos_app.outputs.app_path }}"
          broken_links="$(find -L "$app_path" -type l -print || true)"
          absolute_links="$(find "$app_path" -type l -exec sh -c '
            for link do
              target=$(readlink "$link" || true)
              if [ -n "$target" ] && [ "${target#/}" != "$target" ]; then
                printf "%s\n" "$link"
              fi
            done
          ' sh {} +)"
          unsafe_links="$(printf '%s\n%s\n' "$broken_links" "$absolute_links" | awk 'NF && !seen[$0]++')"
          if [ -n "$unsafe_links" ]; then
            printf '%s\n' "$unsafe_links"
            printf '%s\n' "$unsafe_links" | while IFS= read -r link; do
              [ -n "$link" ] && rm -f "$link"
            done
          fi

      - name: Import Apple signing certificate
        if: matrix.name == 'macos'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          cert_path="$RUNNER_TEMP/apple-cert.p12"
          keychain_path="$RUNNER_TEMP/app-signing.keychain-db"
          printf '%s' "$APPLE_CERTIFICATE" | openssl base64 -d -A -out "$cert_path"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$cert_path" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$keychain_path"
          security list-keychains -d user -s "$keychain_path"
          security default-keychain -d user -s "$keychain_path"

      - name: Sign macOS app
        if: matrix.name == 'macos'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          app_path="${{ steps.locate_macos_app.outputs.app_path }}"
          signing_identity="$(security find-identity -v -p codesigning | sed -n 's/.*"\(Developer ID Application:.*\)"/\1/p' | head -n 1)"
          if [ -z "$signing_identity" ]; then
            echo "Developer ID Application identity was not found in the imported keychain"
            exit 1
          fi
          if [ -n "$APPLE_TEAM_ID" ] && ! printf '%s' "$signing_identity" | grep -q "(${APPLE_TEAM_ID})"; then
            echo "Imported signing identity does not match APPLE_TEAM_ID=${APPLE_TEAM_ID}"
            echo "Found identity: $signing_identity"
            exit 1
          fi
          frameworks_dir="$app_path/Contents/Frameworks"
          embedded_app_zip="$app_path/Contents/Frameworks/App.framework/Versions/A/Resources/flutter_assets/app/app.zip"

          if [ -f "$embedded_app_zip" ]; then
            tmp_zip_dir="$(mktemp -d)"
            extracted_app_dir="$tmp_zip_dir/app"
            mkdir -p "$extracted_app_dir"
            ditto -x -k "$embedded_app_zip" "$extracted_app_dir"

            find "$extracted_app_dir" -type f -print0 | while IFS= read -r -d '' file_path; do
              if file -b "$file_path" | grep -q "Mach-O"; then
                codesign --force --timestamp --sign "$signing_identity" "$file_path"
              fi
            done

            rm -f "$embedded_app_zip"
            (
              cd "$extracted_app_dir"
              /usr/bin/zip -qry --symlinks "$embedded_app_zip" .
            )
          fi

          # Sign nested Mach-O files first so Python/OpenSSL dylibs get a fresh
          # Developer ID signature and secure timestamp before the bundle signs.
          find "$frameworks_dir" -type f -print0 | while IFS= read -r -d '' file_path; do
            if file -b "$file_path" | grep -q "Mach-O"; then
              codesign --force --timestamp --sign "$signing_identity" "$file_path"
            fi
          done

          find "$frameworks_dir" -depth -type d \( -name "*.framework" -o -name "*.app" -o -name "*.xpc" \) -print0 | while IFS= read -r -d '' bundle_path; do
            codesign --force --options runtime --timestamp --sign "$signing_identity" "$bundle_path"
          done

          codesign --force --options runtime --timestamp --sign "$signing_identity" "$app_path"

      - name: Verify macOS signature
        if: matrix.name == 'macos'
        run: |
          app_path="${{ steps.locate_macos_app.outputs.app_path }}"
          codesign --verify --deep --strict --verbose=2 "$app_path"

      - name: Notarize macOS app
        if: matrix.name == 'macos'
        id: notarize_macos_app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          app_path="${{ steps.locate_macos_app.outputs.app_path }}"
          notarize_zip="$RUNNER_TEMP/watchcat-notarize.zip"
          notarize_result="$RUNNER_TEMP/notarytool-submit.json"
          notarize_log="$RUNNER_TEMP/notarytool-log.json"
          ditto -c -k --keepParent "$app_path" "$notarize_zip"
          xcrun notarytool submit "$notarize_zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --output-format json > "$notarize_result"
          cat "$notarize_result"
          submission_id="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1], encoding="utf-8")).get("id", ""))' "$notarize_result")"
          submission_status="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1], encoding="utf-8")).get("status", ""))' "$notarize_result")"
          echo "submission_id=$submission_id" >> "$GITHUB_OUTPUT"
          echo "submission_status=$submission_status" >> "$GITHUB_OUTPUT"
          if [ "$submission_status" != "Accepted" ]; then
            if [ -n "$submission_id" ]; then
              xcrun notarytool log "$submission_id" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" \
                "$notarize_log" || true
              if [ -f "$notarize_log" ]; then
                cat "$notarize_log"
              fi
            fi
            echo "Notarization did not succeed. Final status: $submission_status"
            exit 1
          fi

      - name: Staple notarization ticket
        if: matrix.name == 'macos'
        run: |
          app_path="${{ steps.locate_macos_app.outputs.app_path }}"
          for attempt in 1 2 3 4 5; do
            if xcrun stapler staple "$app_path"; then
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "Stapling failed after $attempt attempts for notarization submission ${{ steps.notarize_macos_app.outputs.submission_id }}"
              exit 1
            fi
            sleep $((attempt * 15))
          done
          xcrun stapler validate "$app_path"
          spctl -a -vv "$app_path"

      - name: Package macOS app
        if: matrix.name == 'macos'
        run: |
          mkdir -p dist
          app_path="${{ steps.locate_macos_app.outputs.app_path }}"
          ditto -c -k --sequesterRsrc --keepParent "$app_path" "dist/${{ matrix.artifact_name }}.zip"

      - name: Package Windows app
        if: matrix.name == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $zipPath = "dist/${{ matrix.artifact_name }}.zip"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          $exe = Get-ChildItem "build/windows" -Recurse -Filter *.exe -File | Select-Object -First 1
          if (-not $exe) {
            throw "Expected an .exe file somewhere under build/windows."
          }
          Compress-Archive -Path "build/windows/*" -DestinationPath $zipPath

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}.zip
          if-no-files-found: error

  release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: watchcat-*
          path: release-assets
          merge-multiple: true

      - name: Show release assets
        run: |
          find release-assets -maxdepth 2 -type f -print

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" release-assets/*.zip --clobber
          else
            gh release create "$tag" release-assets/*.zip --verify-tag --generate-notes
          fi
