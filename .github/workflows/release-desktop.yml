name: Release Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  UV_PYTHON: "3.12"
  PYTHONUTF8: "1"
  FLET_CLI_NO_RICH_OUTPUT: "1"

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos
            runner: macos-15
            build_cmd: flet build macos
            artifact_name: watchcat-macos
          - name: windows
            runner: windows-2022
            build_cmd: flet build windows
            artifact_name: watchcat-windows

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Install macOS prerequisites
        if: matrix.name == 'macos'
        run: |
          sudo softwareupdate --install-rosetta --agree-to-license || true
          if ! command -v pod >/dev/null 2>&1; then
            sudo gem install cocoapods
          fi
          pod --version

      - name: Build app
        run: |
          uv run ${{ matrix.build_cmd }} --yes --verbose

      - name: Show build outputs
        run: |
          find build -maxdepth 6 -print

      - name: Package macOS app
        if: matrix.name == 'macos'
        run: |
          mkdir -p dist
          app_path="$(find build/macos -name '*.app' -print -quit)"
          if [ -z "$app_path" ]; then
            echo "No .app bundle found in build/macos"
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$app_path" "dist/${{ matrix.artifact_name }}.zip"

      - name: Package Windows app
        if: matrix.name == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $zipPath = "dist/${{ matrix.artifact_name }}.zip"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          $exe = Get-ChildItem "build/windows" -Recurse -Filter *.exe -File | Select-Object -First 1
          if (-not $exe) {
            throw "Expected an .exe file somewhere under build/windows."
          }
          Compress-Archive -Path "build/windows/*" -DestinationPath $zipPath

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}.zip
          if-no-files-found: error

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: watchcat-*
          path: release-assets
          merge-multiple: true

      - name: Show release assets
        run: |
          find release-assets -maxdepth 2 -type f -print

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" release-assets/*.zip --clobber
          else
            gh release create "$tag" release-assets/*.zip --verify-tag --generate-notes
          fi
