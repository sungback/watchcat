name: Desktop CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  UV_PYTHON: "3.12"
  PYTHONUTF8: "1"
  FLET_CLI_NO_RICH_OUTPUT: "1"
  FLET_CLI_VERSION: "0.83.1"

concurrency:
  group: desktop-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos
            runner: macos-15
            build_target: macos
            artifact_name: watchcat-macos-unsigned-ci
          - name: windows
            runner: windows-2022
            build_target: windows
            artifact_name: watchcat-windows-unsigned-ci

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Install macOS prerequisites
        if: matrix.name == 'macos'
        run: |
          xcodebuild -version
          sudo softwareupdate --install-rosetta --agree-to-license || true
          if ! command -v pod >/dev/null 2>&1; then
            sudo gem install cocoapods
          fi
          pod --version

      - name: Build app
        run: |
          uvx --from "flet-cli==${FLET_CLI_VERSION}" flet build ${{ matrix.build_target }} --yes --verbose --clear-cache

      - name: Diagnose failed build
        if: failure()
        run: |
          echo "Build tree:"
          find build -maxdepth 8 -print || true
          echo
          echo "Flutter build tree:"
          find build/flutter/build -maxdepth 8 -print || true
          echo
          echo "Packaged app contents:"
          find build/flutter/app -maxdepth 4 -print || true

      - name: Show build outputs
        run: |
          find build -maxdepth 6 -print

      - name: Package macOS app
        if: matrix.name == 'macos'
        run: |
          mkdir -p dist
          app_path="$(find build/macos -name '*.app' -print -quit)"
          if [ -z "$app_path" ]; then
            echo "No .app bundle found in build/macos"
            exit 1
          fi
          cat > dist/UNSIGNED_CI_ARTIFACT.txt <<'EOF'
          This archive is produced by the Desktop CI workflow.
          It is for build verification only and is not notarized for public distribution.
          Use the GitHub Release asset produced by release-desktop.yml for end-user delivery.
          EOF
          ditto -c -k --sequesterRsrc --keepParent "$app_path" "dist/${{ matrix.artifact_name }}.zip"

      - name: Package Windows app
        if: matrix.name == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          @"
          This archive is produced by the Desktop CI workflow.
          It is for build verification only and is not a signed release artifact.
          Use the GitHub Release asset produced by release-desktop.yml for end-user delivery.
          "@ | Set-Content -Path "dist/UNSIGNED_CI_ARTIFACT.txt"
          $zipPath = "dist/${{ matrix.artifact_name }}.zip"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          $exe = Get-ChildItem "build/windows" -Recurse -Filter *.exe -File | Select-Object -First 1
          if (-not $exe) {
            throw "Expected an .exe file somewhere under build/windows."
          }
          Compress-Archive -Path "build/windows/*" -DestinationPath $zipPath

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/${{ matrix.artifact_name }}.zip
            dist/UNSIGNED_CI_ARTIFACT.txt
          if-no-files-found: error
